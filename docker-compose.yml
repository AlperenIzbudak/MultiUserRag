volumes:
  n8n_storage:
  postgres_storage:
  qdrant_storage:
  docling_data:

networks:
  demo:

x-n8n: &service-n8n
  image: n8nio/n8n:latest
  networks: ['demo']
  extra_hosts:
    - host.docker.internal:host-gateway
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal:11434}
    - N8N_RESTRICT_FILE_ACCESS_TO=/data/shared
    - NODES_EXCLUDE=[]
  env_file:
    - path: .env
      required: true

# ===========================================
# Docling Base Configuration (YAML Anchor)
# ===========================================
x-docling: &service-docling
  image: ghcr.io/docling-project/docling-serve-rocm:main
  container_name: docling
  networks:
    demo:
      aliases:
        - docling
  restart: unless-stopped
  # Run as root to fix bind mount permissions on Windows
  user: root
  # Override working directory so referenced images are saved to shared folder
  working_dir: /shared/docling-scratch
  expose:
    - 5001/tcp
  ports:
    - ${DOCLING_PORT:-5001}:5001
  environment:
    - DOCLING_SERVE_ENABLE_UI=true
    # Store extracted images in shared folder accessible by other services
    - DOCLING_SERVE_SCRATCH_PATH=/shared/docling-scratch
    # Keep results after retrieval so other services can access them
    - DOCLING_SERVE_SINGLE_USE_RESULTS=false
    # Gradio security: allow writing to /shared directory
    - GRADIO_ALLOWED_PATHS=/shared
    - GRADIO_TEMP_DIR=/shared/docling-scratch
    - ROCR_VISIBLE_DEVICES=0
    - DOCLING_SERVE_ENABLE_REMOTE_SERVICES=true
  volumes:
    - docling_data:/data
    - ./shared:/shared
  devices:
    - /dev/kfd:/dev/kfd
    - /dev/dri:/dev/dri
  group_add:
    - 44    # video group GID (run: getent group video)
    - 109   # render group GID (run: getent group render)
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres1
    hostname: postgres
    networks: ['demo']
    restart: unless-stopped
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_storage:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n-import:
    <<: *service-n8n
    hostname: n8n-import
    container_name: n8n-import
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        # Only import if not already done (check marker file)
        if [ -f /demo-data/.imported ]; then
          echo "Demo data already imported - skipping"
        else
          echo "First run detected - importing demo data..."
          n8n import:credentials --separate --input=/demo-data/credentials
          n8n import:workflow --separate --input=/demo-data/workflows
          touch /demo-data/.imported
          echo "Import complete"
        fi
    volumes:
      - ./n8n/demo-data:/demo-data
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    <<: *service-n8n
    hostname: n8n
    container_name: n8n
    restart: unless-stopped
    # Run as root to access shared files created by Docling (also running as root)
    user: root
    ports:
      - ${N8N_PORT:-5678}:5678
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/demo-data:/demo-data
      - ./shared:/data/shared
      - ./shared/rag-files:/data/rag-files
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully

  qdrant:
    image: qdrant/qdrant
    hostname: qdrant
    container_name: qdrant
    networks: ['demo']
    restart: unless-stopped
    ports:
      - ${QDRANT_PORT:-6333}:6333
    volumes:
      - qdrant_storage:/qdrant/storage

  # ===========================================
  # Static File Server - Serves shared folder
  # ===========================================
  # Access files at http://localhost:${STATIC_FILES_PORT:-8080}/
  # Example: http://localhost:${STATIC_FILES_PORT:-8080}/extracted-images/image_xxx.png
  static-files:
    image: nginx:alpine
    hostname: static-files
    container_name: static-files
    networks: ['demo']
    restart: unless-stopped
    ports:
      - ${STATIC_FILES_PORT:-8080}:80
    volumes:
      - ./shared/extracted-images:/usr/share/nginx/html:ro
    command: |
      sh -c "echo 'server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;
        autoindex on;
        location / {
          try_files \$$uri \$$uri/ =404;
          add_header Access-Control-Allow-Origin *;
        }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  # ===========================================
  # Docling - Document Processing
  # ===========================================
  # OCR and document parsing service
  # Accessible at http://localhost:${DOCLING_PORT:-5001}
  # Uses AMD GPU via ROCm by default
  # Docs: https://github.com/docling-project/docling-serve

  docling:
    <<: *service-docling
